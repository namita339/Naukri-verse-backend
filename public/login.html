<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NaukriVerse</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
background:#111827;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
text-align:center;
}

.container h1{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-size:14px;
}

input::placeholder{
color:#9ca3af;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#7c3aed,#06b6d4);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
}

p{
margin-top:15px;
font-size:14px;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>NaukriVerse Login</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>Don't have an account? <a href="register.html">Register</a></p>

</div>


<script>

function login(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

fetch("/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

.then(res=>res.json())

.then(data=>{

if(data.token){

localStorage.setItem("token",data.token);

alert("Login successful");

window.location.href="index.html";

}else{

alert(data.message || "Login failed");

}

})

.catch(err=>console.log(err));

}

</script>

</body>
</html>
